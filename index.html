<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rescrawl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      background: #1a1a1a;
    }

    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #canvas-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #canvas {
      display: block;
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      aspect-ratio: 2 / 3;
    }
    #canvas.no-draw { cursor: not-allowed; }

    #panel {
      width: 240px;
      background: #222;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      color: #ccc;
    }
    body.panel-left #panel {
      order: -1;
      border-left: none;
      border-right: 1px solid #333;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    #bottom-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #222;
      border-top: 1px solid #333;
    }

    button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-play    { background: #4f8ef7; color: #fff; }
    #btn-clear   { background: #e55; color: #fff; }
    #btn-export  { background: #555; color: #fff; }
    #btn-import  { background: #555; color: #fff; }

    #scrubber {
      flex: 1;
      accent-color: #4f8ef7;
      cursor: pointer;
    }
    #scrubber:disabled { opacity: 0.4; cursor: default; }

    #btn-smooth, #btn-cap-dt, #btn-align, #btn-align-apply, #btn-settings { background: #555; color: #fff; }
    #btn-settings { flex: 0 0 auto; padding: 6px 8px; display: flex; align-items: center; }
    #btn-smooth.active, #btn-cap-dt.active, #btn-align.active { background: #4f8ef7; }

    .check-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      cursor: pointer;
      accent-color: #4f8ef7;
    }

    .section-label {
      width: 100%;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .btn-row button, .btn-row input[type="number"] { flex: 1; min-width: 0; }
    .btn-row input[type="number"] {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #eee;
      font-size: 13px;
      padding: 4px 6px;
      outline: none;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .btn-row button { flex: 1; }

    dialog {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: #ccc;
      padding: 20px;
      min-width: 260px;
      position: fixed;
      top: 50%;
      left: 50%;
      translate: -50% -50%;
      margin: 0;
    }
    dialog::backdrop { background: rgba(0,0,0,0.5); }
    .dialog-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; font-size: 13px; }
    .dialog-field label { color: #888; display: flex; align-items: center; gap: 6px; }
    .dialog-field input[type="text"] {
      background: #1a1a1a; border: 1px solid #444; border-radius: 4px;
      color: #eee; font-size: 13px; padding: 5px 8px; outline: none;
    }
    .dialog-field input[type="text"]:focus { border-color: #4f8ef7; }
    .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
    #export-confirm { background: #4f8ef7; color: #fff; }
    #export-cancel, #settings-close, #btn-settings-reset { background: #555; color: #fff; }

    #status {
      font-size: 12px;
      color: #888;
      align-self: center;
    }

    #stroke-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .stroke-row {
      background: #2a2a2a;
      border: 1px solid #383838;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    .stroke-row.selected {
      border-color: #4f8ef7;
      background: #1e2d3d;
    }

    .stroke-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .stroke-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stroke-actions {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .btn-delete, .btn-move-up, .btn-move-down {
      background: none;
      border: none;
      color: #666;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      cursor: pointer;
      border-radius: 3px;
    }
    .btn-delete { font-size: 16px; }
    .btn-delete:hover { color: #e55; }
    .btn-move-up:hover:not(:disabled), .btn-move-down:hover:not(:disabled) { color: #4f8ef7; }

    .stroke-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .stroke-fields label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 11px;
      color: #777;
    }

    .stroke-fields input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #eee;
      font-size: 12px;
      padding: 3px 5px;
      outline: none;
    }
    .stroke-fields input:focus {
      border-color: #4f8ef7;
    }

    #no-strokes {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 20px;
    }

    .stroke-cursor {
      height: 22px;
      cursor: pointer;
      position: relative;
      display: flex;
      align-items: center;
    }
    .stroke-cursor::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      border-radius: 1px;
      background: #4f8ef7;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .stroke-cursor:hover::before { opacity: 0.4; }
    .stroke-cursor.active::before { opacity: 1; }
  </style>
</head>
<body>
  <div id="main-area">
    <div id="canvas-area">
      <canvas id="canvas"></canvas>
    </div>
    <div id="bottom-bar">
      <button id="btn-play" disabled>▶</button>
      <input type="range" id="scrubber" min="0" value="0" step="1" disabled />
      <button id="btn-clear">Clear</button>
    </div>
  </div>
  <div id="panel">
      <div id="controls">
        <div class="btn-row">
          <button id="btn-settings"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24"><path d="M9.7 4.1a2.3 2.3 0 0 1 4.6 0 2.3 2.3 0 0 0 3.3 2 2.3 2.3 0 0 1 2.4 4 2.3 2.3 0 0 0 0 3.8 2.3 2.3 0 0 1-2.4 4 2.3 2.3 0 0 0-3.3 2 2.3 2.3 0 0 1-4.6 0 2.3 2.3 0 0 0-3.3-2A2.3 2.3 0 0 1 4 14a2.3 2.3 0 0 0 0-3.8 2.3 2.3 0 0 1 2.3-4 2.3 2.3 0 0 0 3.4-2"/><circle cx="12" cy="12" r="3"/></svg></button>
          <button id="btn-import">Import</button>
          <button id="btn-export" disabled>Export</button>
        </div>
        <input type="file" id="file-input" accept=".scrawl,.scrawl.gz" style="display:none" />
        <span id="status"></span>
        <div class="section-label">Canvas</div>
        <label class="check-row"><input type="checkbox" id="chk-guidelines" /> Guidelines</label>
        <div class="section-label">Transformations</div>
        <div class="btn-row">
          <button id="btn-smooth">Smooth</button>
          <input type="number" id="smooth-input" value="3" min="1" title="Smooth passes">
        </div>
        <div class="btn-row">
          <button id="btn-cap-dt">Cap dt</button>
          <input type="number" id="cap-dt-input" value="2000" min="1" title="Max dt (ms)">
        </div>
        <div class="section-label">Layout</div>
        <div class="btn-row">
          <button id="btn-align">Align</button>
        </div>
        <div class="btn-row">
          <input type="number" id="pad-x-input" value="40" min="0" title="Padding x (px)" placeholder="x">
          <input type="number" id="pad-y-input" value="40" min="0" title="Padding y (px)" placeholder="y">
        </div>
        <div class="btn-row">
          <button id="btn-align-apply" disabled>Apply</button>
        </div>
      </div>
      <div id="stroke-list"><div id="no-strokes">No strokes yet</div></div>
    </div>
  </div>
  <dialog id="export-dialog">
    <form id="export-form">
      <div class="dialog-field">
        <label for="export-filename">Filename</label>
        <input type="text" id="export-filename" placeholder="drawing" spellcheck="false" />
      </div>
      <div class="dialog-field">
        <label><input type="checkbox" id="export-gzip" /> Gzip compression</label>
      </div>
      <div class="dialog-actions">
        <button type="button" id="export-cancel">Cancel</button>
        <button type="button" id="export-confirm">Export</button>
      </div>
    </form>
  </dialog>
  <dialog id="settings-dialog">
    <div class="dialog-field">
      <label class="check-row"><input type="checkbox" id="chk-sidebar-right" /> Sidebar on right</label>
    </div>
    <div class="dialog-actions">
      <button type="button" id="btn-settings-reset">Reset to defaults</button>
      <button type="button" id="settings-close">Close</button>
    </div>
  </dialog>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
