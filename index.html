<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rescrawl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-family: sans-serif;
      background: #1a1a1a;
    }

    #canvas-area {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    #canvas {
      display: block;
      background: #fff;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      aspect-ratio: 2 / 3;
    }

    #panel {
      width: 240px;
      background: #222;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      color: #ccc;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid #333;
    }

    button {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.1s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-play    { background: #4f8ef7; color: #fff; }
    #btn-clear   { background: #e55; color: #fff; }
    #btn-export  { background: #555; color: #fff; }
    #btn-import  { background: #555; color: #fff; }

    #scrubber {
      width: 100%;
      accent-color: #4f8ef7;
      cursor: pointer;
    }
    #scrubber:disabled { opacity: 0.4; cursor: default; }

    #status {
      font-size: 12px;
      color: #888;
      align-self: center;
    }

    #stroke-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stroke-row {
      background: #2a2a2a;
      border: 1px solid #383838;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }
    .stroke-row.selected {
      border-color: #4f8ef7;
      background: #1e2d3d;
    }

    .stroke-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .stroke-label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #666;
      font-size: 16px;
      line-height: 1;
      padding: 0 2px;
      cursor: pointer;
      border-radius: 3px;
    }
    .btn-delete:hover { color: #e55; }

    .stroke-fields {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 6px;
    }

    .stroke-fields label {
      display: flex;
      flex-direction: column;
      gap: 2px;
      font-size: 11px;
      color: #777;
    }

    .stroke-fields input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #eee;
      font-size: 12px;
      padding: 3px 5px;
      outline: none;
    }
    .stroke-fields input:focus {
      border-color: #4f8ef7;
    }

    #no-strokes {
      font-size: 12px;
      color: #555;
      text-align: center;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div id="canvas-area">
    <canvas id="canvas"></canvas>
  </div>
  <div id="panel">
    <div id="controls">
      <button id="btn-play" disabled>▶</button>
      <button id="btn-clear">Clear</button>
      <button id="btn-export" disabled>Export</button>
      <button id="btn-import">Import</button>
      <input type="file" id="file-input" accept=".scrawl" style="display:none" />
      <span id="status"></span>
      <input type="range" id="scrubber" min="0" value="0" step="1" disabled />
    </div>
    <div id="stroke-list"><div id="no-strokes">No strokes yet</div></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
